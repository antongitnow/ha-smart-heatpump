# Smart Heatpump Controller — Home Assistant Helper Entities
#
# This file defines all input_number sliders and the input_text status entity
# used by the Smart Heatpump Controller.
#
# INSTALLATION
# Add the packages mechanism to your configuration.yaml:
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# Then place this file at: config/packages/smart_heatpump.yaml
# Restart Home Assistant once to create the helpers.
#
# All values can be adjusted live from the Lovelace dashboard without
# restarting Home Assistant or AppDaemon.

input_number:

  # ---------------------------------------------------------------------------
  # Temperature targets
  # ---------------------------------------------------------------------------

  shp_temp_ideal:
    name: "SHP — Ideal temperature"
    min: 16
    max: 26
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer
    initial: 21.0

  shp_temp_minimum:
    name: "SHP — Minimum temperature (hard floor)"
    min: 14
    max: 24
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer-low
    initial: 20.5

  shp_temp_solar_boost:
    name: "SHP — Solar boost temperature"
    min: 18
    max: 26
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:solar-power
    initial: 22.5

  shp_preheat_delta:
    name: "SHP — Pre-heat delta above ideal"
    min: 0
    max: 2.0
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer-plus
    initial: 0.5

  # ---------------------------------------------------------------------------
  # COP thresholds
  # ---------------------------------------------------------------------------

  shp_cop_threshold_temp:
    name: "SHP — COP threshold temperature"
    min: -10
    max: 15
    step: 1.0
    unit_of_measurement: "°C"
    icon: mdi:heat-pump-outline
    initial: 5.0

  shp_cop_recovery_horizon_hours:
    name: "SHP — COP recovery horizon"
    min: 1
    max: 24
    step: 1
    unit_of_measurement: "h"
    icon: mdi:clock-fast
    initial: 6

  # ---------------------------------------------------------------------------
  # Solar surplus settings
  # ---------------------------------------------------------------------------

  shp_solar_surplus_threshold:
    name: "SHP — Solar surplus threshold"
    min: 0
    max: 5000
    step: 100
    unit_of_measurement: "W"
    icon: mdi:solar-panel
    initial: 500

  shp_solar_confirm_minutes:
    name: "SHP — Solar surplus confirmation delay"
    min: 0
    max: 60
    step: 5
    unit_of_measurement: "min"
    icon: mdi:timer-outline
    initial: 10

  # ---------------------------------------------------------------------------
  # Forecast & thermal lag
  # ---------------------------------------------------------------------------

  shp_forecast_horizon_hours:
    name: "SHP — Forecast horizon"
    min: 1
    max: 48
    step: 1
    unit_of_measurement: "h"
    icon: mdi:weather-partly-cloudy
    initial: 24

  shp_thermal_lag_hours:
    name: "SHP — Floor heating thermal lag"
    min: 0
    max: 6
    step: 0.5
    unit_of_measurement: "h"
    icon: mdi:floor-plan
    initial: 3

  # ---------------------------------------------------------------------------
  # Controller timing
  # ---------------------------------------------------------------------------

  shp_evaluation_interval_min:
    name: "SHP — Evaluation interval"
    min: 5
    max: 60
    step: 5
    unit_of_measurement: "min"
    icon: mdi:refresh
    initial: 15

# ---------------------------------------------------------------------------
# Observability — active rule display
# ---------------------------------------------------------------------------

input_text:

  shp_active_rule:
    name: "SHP — Active rule"
    initial: "initialising"
    max: 30
    icon: mdi:information-outline
