# Smart Heatpump Controller — AppDaemon app configuration
#
# Copy this file to your AppDaemon apps directory alongside smart_heatpump.py.
# Typical path: /config/appdaemon/apps/smart_heatpump/smart_heatpump.yaml
#
# After editing, restart AppDaemon (not all of Home Assistant).
#
# HOW TO FIND ENTITY NAMES
# Open Home Assistant → Developer Tools → States.
# Search for your thermostat (e.g. "climate") and your power sensor (e.g. "power").
# Copy the entity_id exactly as shown.

smart_heatpump:
  module: smart_heatpump
  class: SmartHeatpump

  # -------------------------------------------------------------------------
  # REQUIRED — replace with your actual entity names
  # -------------------------------------------------------------------------

  # The climate entity that controls your thermostat / heat pump.
  # Example: climate.living_room, climate.honeywell_t6
  thermostat_entity: "climate.PLACEHOLDER_THERMOSTAT"

  # Net grid power sensor from your P1 / smart meter integration.
  # Unit must be Watts (W). Positive = importing, negative = exporting solar.
  # Example (HomeWizard P1): sensor.p1_meter_active_power_w
  p1_net_power_entity: "sensor.PLACEHOLDER_P1_NET_POWER"

  # -------------------------------------------------------------------------
  # OPTIONAL — defaults shown below work for most standard HA installations
  # -------------------------------------------------------------------------

  # Weather entity providing current outdoor temperature and hourly forecast.
  # Met.no (built-in HA integration, no API key needed) is the recommended source.
  # Default: weather.home
  weather_entity: "weather.home"

  # Forecast.Solar entity for predictive solar boost (FR-03).
  # Install Forecast.Solar via HACS, configure your panel details, then set
  # the entity name here. Typically: sensor.energy_production_next_hour
  # Set to null (or remove this line) if you don't have Forecast.Solar installed.
  forecast_solar_entity: null

  # -------------------------------------------------------------------------
  # All numeric parameters are controlled via input_number helpers in the HA UI.
  # See config/packages/smart_heatpump.yaml for helper definitions.
  # No numeric values need to be changed here.
  # -------------------------------------------------------------------------
