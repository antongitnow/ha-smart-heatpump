# Smart Heatpump Controller — Lovelace Dashboard Card
#
# HOW TO ADD THIS CARD TO YOUR DASHBOARD
# 1. Open Home Assistant → your dashboard → Edit (pencil icon)
# 2. Click "+ Add Card" → "Manual" (scroll to bottom)
# 3. Paste the YAML below (everything after the dashes) into the card editor
# 4. Click Save
#
# If your thermostat or weather entity names differ from the defaults,
# update the entity references marked with # <-- UPDATE below.

type: entities
title: Smart Heatpump Controller
show_header_toggle: false
entities:

  # --------------------------------------------------------------------------
  # Status
  # --------------------------------------------------------------------------

  - type: section
    label: Status

  - entity: input_text.shp_active_rule
    name: Active rule
    icon: mdi:information-outline

  - entity: climate.PLACEHOLDER_THERMOSTAT   # <-- UPDATE to your thermostat entity
    name: Thermostat setpoint
    attribute: temperature
    icon: mdi:thermostat

  - entity: weather.home                     # <-- UPDATE if your weather entity differs
    name: Outdoor temperature
    attribute: temperature
    icon: mdi:thermometer

  # --------------------------------------------------------------------------
  # Temperature targets
  # --------------------------------------------------------------------------

  - type: section
    label: Temperature targets

  - entity: input_number.shp_temp_ideal
    name: Ideal temperature

  - entity: input_number.shp_temp_minimum
    name: Minimum temperature (hard floor)

  - entity: input_number.shp_temp_solar_boost
    name: Solar boost temperature

  - entity: input_number.shp_preheat_delta
    name: Pre-heat delta above ideal

  # --------------------------------------------------------------------------
  # COP settings
  # --------------------------------------------------------------------------

  - type: section
    label: COP settings

  - entity: input_number.shp_cop_threshold_temp
    name: COP threshold temperature

  - entity: input_number.shp_cop_recovery_horizon_hours
    name: COP recovery horizon

  # --------------------------------------------------------------------------
  # Solar settings
  # --------------------------------------------------------------------------

  - type: section
    label: Solar settings

  - entity: input_number.shp_solar_surplus_threshold
    name: Solar surplus threshold

  - entity: input_number.shp_solar_confirm_minutes
    name: Solar confirmation delay

  # --------------------------------------------------------------------------
  # Notifications
  # --------------------------------------------------------------------------

  - type: section
    label: Notifications

  - entity: input_boolean.shp_notifications_enabled
    name: Push notifications on rule change

  # --------------------------------------------------------------------------
  # Forecast & timing
  # --------------------------------------------------------------------------

  - type: section
    label: Forecast & timing

  - entity: input_number.shp_forecast_horizon_hours
    name: Forecast horizon

  - entity: input_number.shp_thermal_lag_hours
    name: Floor heating thermal lag

  - entity: input_number.shp_evaluation_interval_min
    name: Evaluation interval
