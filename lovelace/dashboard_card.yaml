# Smart Heatpump Controller — Lovelace Dashboard Card
#
# HOW TO ADD THIS CARD TO YOUR DASHBOARD
# 1. Open Home Assistant → your dashboard → Edit (pencil icon)
# 2. Click "+ Add Card" → "Manual" (scroll to bottom)
# 3. Paste the YAML below into the card editor
# 4. Click Save
#
# Entity names use the default naming convention from the integration.
# If you renamed entities in the UI, update the references below.

type: entities
title: Smart Heatpump Controller
show_header_toggle: false
entities:

  # --------------------------------------------------------------------------
  # Status
  # --------------------------------------------------------------------------

  - type: section
    label: Status

  - entity: sensor.smart_heatpump_controller_active_rule
    name: Active rule

  # --------------------------------------------------------------------------
  # Temperature targets
  # --------------------------------------------------------------------------

  - type: section
    label: Temperature targets

  - entity: number.smart_heatpump_controller_ideal_temperature
    name: Ideal temperature

  - entity: number.smart_heatpump_controller_minimum_temperature
    name: Minimum temperature

  - entity: number.smart_heatpump_controller_solar_boost_temperature
    name: Solar boost temperature

  - entity: number.smart_heatpump_controller_pre_heat_delta
    name: Pre-heat delta

  # --------------------------------------------------------------------------
  # COP settings
  # --------------------------------------------------------------------------

  - type: section
    label: COP settings

  - entity: number.smart_heatpump_controller_cop_threshold_temperature
    name: COP threshold temperature

  - entity: number.smart_heatpump_controller_cop_recovery_horizon
    name: COP recovery horizon

  # --------------------------------------------------------------------------
  # Solar settings
  # --------------------------------------------------------------------------

  - type: section
    label: Solar settings

  - entity: number.smart_heatpump_controller_solar_surplus_threshold
    name: Solar surplus threshold

  - entity: number.smart_heatpump_controller_solar_confirmation_delay
    name: Solar confirmation delay

  # --------------------------------------------------------------------------
  # Notifications
  # --------------------------------------------------------------------------

  - type: section
    label: Notifications

  - entity: switch.smart_heatpump_controller_notifications
    name: Push notifications

  # --------------------------------------------------------------------------
  # Forecast & timing
  # --------------------------------------------------------------------------

  - type: section
    label: Forecast & timing

  - entity: number.smart_heatpump_controller_forecast_horizon
    name: Forecast horizon

  - entity: number.smart_heatpump_controller_floor_heating_thermal_lag
    name: Floor heating thermal lag

  - entity: number.smart_heatpump_controller_evaluation_interval
    name: Evaluation interval
